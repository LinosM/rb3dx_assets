# rb3dx_assets/.github/workflows/notify-main.yml
name: Notify rb3dx repo

on:
  push:
    branches: [main]

jobs:
  dispatch:
    runs-on: ubuntu-latest
    steps:
      - name: Trigger downstream build
        run: |
          curl -X PUT \
            -H "Authorization: Bearer ${{ secrets.RB3DX_ASSETS_PAT }}" \
            -H "Accept: application/vnd.github.v3+json" \
            https://api.github.com/repos/LinosM/rock-band-3-deluxe/contents/.assets_updated \
            -d "{
              \"message\": \"chore: sync rb3dx_assets\",
              \"content\": \"$(date +%s | base64)\",
              \"branch\": \"char_pull\",
              \"sha\": \"$(curl -s -H 'Authorization: Bearer ${{ secrets.RB3DX_ASSETS_PAT }}' https://api.github.com/repos/LinosM/rock-band-3-deluxe/contents/.assets_updated?ref=char_pull | python3 -c 'import sys,json; print(json.load(sys.stdin).get(\"sha\",\"\"))'  )\"
            }"